<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 300" role="img" aria-labelledby="title desc">
  <title id="title">Remote MCP access flow</title>
  <desc id="desc">AI client calls a remote MCP endpoint, passes a GitHub OAuth allowlist check, reaches a Cloudflare Worker, and operates on your Cloudflare R2 bucket.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f48120" />
    </marker>
  </defs>
  <rect width="1160" height="300" rx="18" fill="#10161d" />
  <g fill="none" stroke="#273241" stroke-width="1">
    <path d="M40 74H1120" opacity="0.55" />
    <path d="M40 150H1120" opacity="0.85" />
    <path d="M40 226H1120" opacity="0.55" />
  </g>
  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(52 92)">
      <rect width="170" height="116" rx="14" fill="#0b0f14" stroke="#344255" />
      <text x="22" y="42" fill="#eef4fb" font-size="19" font-weight="700">AI client</text>
      <text x="22" y="70" fill="#a7b6c8" font-size="14">ChatGPT or</text>
      <text x="22" y="92" fill="#a7b6c8" font-size="14">compatible MCP</text>
    </g>
    <g transform="translate(282 92)">
      <rect width="190" height="116" rx="14" fill="#0b0f14" stroke="#344255" />
      <text x="22" y="42" fill="#eef4fb" font-size="19" font-weight="700">Remote MCP</text>
      <text x="22" y="70" fill="#a7b6c8" font-size="14">Worker-hosted</text>
      <text x="22" y="92" fill="#a7b6c8" font-size="14">/mcp endpoint</text>
    </g>
    <g transform="translate(532 92)">
      <rect width="210" height="116" rx="14" fill="#111820" stroke="#f48120" />
      <text x="22" y="42" fill="#eef4fb" font-size="19" font-weight="700">GitHub OAuth</text>
      <text x="22" y="70" fill="#a7b6c8" font-size="14">Login checked</text>
      <text x="22" y="92" fill="#a7b6c8" font-size="14">against allowlist</text>
    </g>
    <g transform="translate(802 92)">
      <rect width="160" height="116" rx="14" fill="#0b0f14" stroke="#344255" />
      <text x="22" y="42" fill="#eef4fb" font-size="19" font-weight="700">Cloudflare</text>
      <text x="22" y="70" fill="#eef4fb" font-size="19" font-weight="700">Worker</text>
      <text x="22" y="92" fill="#a7b6c8" font-size="14">Your deploy</text>
    </g>
    <g transform="translate(1022 92)">
      <rect width="86" height="116" rx="14" fill="#0b0f14" stroke="#344255" />
      <text x="22" y="48" fill="#eef4fb" font-size="20" font-weight="700">R2</text>
      <text x="22" y="74" fill="#a7b6c8" font-size="14">bucket</text>
      <text x="22" y="96" fill="#a7b6c8" font-size="14">yours</text>
    </g>
  </g>
  <g stroke="#f48120" stroke-width="3" marker-end="url(#arrow)">
    <path d="M222 150H266" />
    <path d="M472 150H516" />
    <path d="M742 150H786" />
    <path d="M962 150H1006" />
  </g>
</svg>
